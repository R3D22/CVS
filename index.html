<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Urogenital Module Planner - Paper 2</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Light Mode Variables */
            --bg-color: #f8faf9;
            --card-bg: #ffffff;
            --primary-green: #145a32;
            --mcq-orange: #e67e22;
            --border-color: #e0e6e3;
            --text-dark: #1a1a1a;
            --text-muted: #666666;
            --hover-bg: #f4f7f5;
            --progress-bg: #e9ecef;
            
            /* Subject Colors - Light */
            --c-anatomy: #e8f5e9; --t-anatomy: #2e7d32;
            --c-histology: #f3e5f5; --t-histology: #7b1fa2;
            --c-physiology: #e3f2fd; --t-physiology: #1976d2;
            --c-pathology: #fff3e0; --t-pathology: #e65100;
            --c-microbiology: #e0f2f1; --t-microbiology: #00796b;
            --c-pharmacology: #ffebee; --t-pharmacology: #c62828;
            --c-parasitology: #fffde7; --t-parasitology: #fbc02d;
        }

        /* Dark Mode Variables */
        body.dark-mode {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --primary-green: #4caf50;
            --mcq-orange: #f39c12;
            --border-color: #333333;
            --text-dark: #f5f5f5;
            --text-muted: #aaaaaa;
            --hover-bg: #2a2a2a;
            --progress-bg: #333333;
            
            /* Subject Colors - Dark */
            --c-anatomy: rgba(46, 125, 50, 0.2);     --t-anatomy: #81c784;
            --c-histology: rgba(123, 31, 162, 0.2);  --t-histology: #ce93d8;
            --c-physiology: rgba(25, 118, 210, 0.2); --t-physiology: #90caf9;
            --c-pathology: rgba(230, 81, 0, 0.2);    --t-pathology: #ffb74d;
            --c-microbiology: rgba(0, 121, 107, 0.2);--t-microbiology: #80cbc4;
            --c-pharmacology: rgba(198, 40, 40, 0.2);--t-pharmacology: #ef9a9a;
            --c-parasitology: rgba(251, 192, 45, 0.2);--t-parasitology: #fff59d;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-dark);
            padding: 20px;
            line-height: 1.6;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Header Styles */
        .header {
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--primary-green);
            position: relative;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 15px;
        }

        .theme-toggle {
            background: var(--card-bg);
            color: var(--text-dark);
            border: 1px solid var(--border-color);
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .theme-toggle:hover {
            border-color: var(--primary-green);
            transform: scale(1.05);
        }

        .univ-title {
            font-size: 0.9rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .main-title {
            font-size: 2.5rem;
            color: var(--primary-green);
            font-weight: 700;
            margin-top: 15px;
        }

        .subtitle {
            font-size: 1.2rem;
            color: var(--text-muted);
            margin-bottom: 10px;
        }

        /* Overall Progress */
        .overall-progress-container {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            margin-bottom: 30px;
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-weight: 600;
            color: var(--primary-green);
        }

        .progress-bar-bg {
            background-color: var(--progress-bg);
            height: 12px;
            border-radius: 10px;
            overflow: hidden;
            transition: background-color 0.3s ease;
        }

        .progress-bar-fill {
            background-color: var(--primary-green);
            height: 100%;
            width: 0%;
            transition: width 0.5s ease-in-out, background-color 0.3s ease;
        }

        /* Day Layout */
        .day-section {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 24px;
            margin-bottom: 30px;
        }

        .day-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: transform 0.2s, background-color 0.3s ease, border-color 0.3s ease;
        }

        .day-card:hover {
            transform: translateY(-2px);
        }

        .day-number {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary-green);
        }

        .day-date {
            color: var(--text-muted);
            margin-bottom: 15px;
        }

        .day-icon {
            font-size: 4rem;
            margin: 10px 0;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
        }

        .schedule-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }

        .schedule-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
        }

        .schedule-header h3 {
            color: var(--primary-green);
            font-size: 1.3rem;
        }

        /* Table Styles */
        .lecture-table {
            width: 100%;
            border-collapse: collapse;
        }

        .lecture-table th {
            font-size: 0.9rem;
            color: var(--text-muted);
            padding: 12px;
            text-align: left;
            border-bottom: 2px solid var(--border-color);
        }
        
        .lecture-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }

        .lecture-table tr {
            transition: background-color 0.2s, opacity 0.3s;
        }

        .lecture-table tr:hover {
            background-color: var(--hover-bg);
        }

        .lecture-table tr.completed td {
            opacity: 0.4;
        }
        
        .lecture-table tr.completed td:not(:first-child):not(:nth-child(2)) {
            text-decoration: line-through;
        }

        .checkbox-cell {
            width: 50px;
            text-align: center !important;
        }

        input[type="checkbox"] {
            width: 22px;
            height: 22px;
            cursor: pointer;
        }

        .check-lec { accent-color: var(--primary-green); }
        .check-mcq { accent-color: var(--mcq-orange); }

        /* Lecture Links */
        .lecture-link {
            color: var(--text-dark);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
            display: inline-block;
            width: 100%;
        }

        .lecture-link:hover {
            color: var(--primary-green);
            text-decoration: underline;
        }

        /* Subject Badges */
        .badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            display: inline-block;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .subject-anatomy { background-color: var(--c-anatomy); color: var(--t-anatomy); }
        .subject-histology { background-color: var(--c-histology); color: var(--t-histology); }
        .subject-physiology { background-color: var(--c-physiology); color: var(--t-physiology); }
        .subject-pathology { background-color: var(--c-pathology); color: var(--t-pathology); }
        .subject-microbiology { background-color: var(--c-microbiology); color: var(--t-microbiology); }
        .subject-pharmacology { background-color: var(--c-pharmacology); color: var(--t-pharmacology); }
        .subject-parasitology { background-color: var(--c-parasitology); color: var(--t-parasitology); }

        /* Footer */
        .footer {
            text-align: center;
            margin-top: 50px;
            padding: 30px;
            border-top: 1px solid var(--border-color);
            color: var(--primary-green);
            font-size: 1.5rem;
            letter-spacing: 15px;
        }

        /* Toast Notifications Styles */
        #toast-container {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .toast {
            background-color: var(--primary-green);
            color: white;
            padding: 16px 24px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
            font-size: 1.1rem;
            font-weight: 600;
            opacity: 0;
            transform: translateX(100%);
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            direction: rtl;
            text-align: right;
            border-right: 6px solid #fbc02d;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(0);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .day-section {
                grid-template-columns: 1fr;
            }
            .day-card {
                flex-direction: row;
                justify-content: space-around;
                padding: 15px;
            }
            .day-icon {
                font-size: 2.5rem;
                margin: 0;
            }
            .lecture-table th {
                display: none;
            }
            .lecture-table td {
                display: block;
                padding: 5px 10px;
                border: none;
                text-align: left !important;
            }
            .lecture-table td.checkbox-cell {
                display: inline-block;
                width: auto;
                margin-right: 15px;
            }
            .lecture-table tr {
                display: block;
                border-bottom: 1px solid var(--border-color);
                padding: 10px 0;
            }
            .header-top {
                flex-direction: row;
                align-items: center;
            }
            #toast-container {
                bottom: 20px;
                right: 20px;
                left: 20px;
            }
            .toast {
                text-align: center;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="header-top">
            <div>
                <div class="univ-title">New Mansoura University • Mansoura Integrated Medical Program</div>
                <div class="univ-title" style="color: var(--primary-green); font-weight: 600;">Dr. R3d</div>
            </div>
            <button id="theme-toggle" class="theme-toggle">🌙</button>
        </div>
        <h1 class="main-title">UROGENITAL MODULE</h1>
        <p class="subtitle">PAPER 2 STUDY PLAN: BALANCED TOPICAL ORGANIZATION</p>
    </div>

    <div class="overall-progress-container">
        <div class="progress-header">
            <span>Overall Plan Completion (Lectures & MCQs)</span>
            <span id="overall-percentage">0%</span>
        </div>
        <div class="progress-bar-bg">
            <div class="progress-bar-fill" id="overall-fill"></div>
        </div>
    </div>

    <div id="schedule-container">
        </div>

    <div class="footer">
        🩺 🔬 💊 🩸 🧬 🧪
    </div>
</div>

<div id="toast-container"></div>

<script>
    const scheduleData = [
        {
            day: 1, date: "JUNE 10", title: "PELVIC ANATOMY & MALE REPRODUCTIVE PATHOLOGY", icon: "🩻",
            lectures: [
                { id: "L26", code: "L26", subject: "Anatomy", title: "Pelvic wall, nerves & blood supply", link: "https://t.me/c/2366096034/5723/6200" },
                { id: "L28", code: "L28", subject: "Anatomy", title: "Female genital system", link: "https://t.me/c/2366096034/5723/6212" },
                { id: "L23", code: "L23", subject: "Physiology", title: "Male reproductive system", link: "https://t.me/c/2366096034/5723/5977" },
                { id: "L24", code: "L24", subject: "Pathology", title: "Pathology of prostatic diseases and male genital system", link: "https://t.me/c/2366096034/5723/6197" },
                { id: "S1", code: "S1", subject: "Pathology", title: "Urinary tract obstruction and infection", link: "https://t.me/c/2366096034/5723/6221" },
                { id: "L25", code: "L25", subject: "Microbiology", title: "Infection of urinary system part 2", link: "https://t.me/c/2366096034/5723/6199" },
                { id: "L35", code: "L35", subject: "Pharmacology", title: "Pharmacology of sex hormone part 1", link: "https://t.me/c/2366096034/5723/6234" },
                { id: "L27", code: "L27", subject: "Histology", title: "Structure of the ovary, oviduct", link: "https://t.me/c/2366096034/5723/6211" },
                { id: "L37", code: "L37", subject: "Parasitology", title: "Trichomoniasis vaginalis & Carcinogenic parasitosis part 1", link: "https://t.me/c/2366096034/5723/6238" }
            ]
        },
        {
            day: 2, date: "JUNE 11", title: "FEMALE REPRODUCTION & GYNECOLOGIC PATHOLOGY", icon: "🧬",
            lectures: [
                { id: "L32", code: "L32", subject: "Anatomy", title: "Development of gonads", link: "https://t.me/c/2366096034/5723/6227" },
                { id: "L40", code: "L40", subject: "Anatomy", title: "Development of duct system & external genitalia, & breast", link: "https://t.me/c/2366096034/5723/6257" },
                { id: "L31", code: "L31", subject: "Physiology", title: "Female reproductive system", link: "https://t.me/c/2366096034/5723/6220" },
                { id: "L34", code: "L34", subject: "Pathology", title: "Pathology of ovarian diseases", link: "https://t.me/c/2366096034/5723/6232" },
                { id: "L38", code: "L38", subject: "Pathology", title: "Pathology of female genital uterus, vagina, vulva", link: "https://t.me/c/2366096034/5723/6246" },
                { id: "L30", code: "L30", subject: "Microbiology", title: "Genital system infections", link: "https://t.me/c/2366096034/5723/6219" },
                { id: "L36", code: "L36", subject: "Microbiology", title: "Viral genital infection", link: "https://t.me/c/2366096034/5723/6237" },
                { id: "L39", code: "L39", subject: "Pharmacology", title: "Pharmacology of sex hormone part 2", link: "https://t.me/c/2366096034/5723/6249" },
                { id: "L29", code: "L29", subject: "Histology", title: "Histology of oviduct and uterus", link: "https://t.me/c/2366096034/5723/6218" }
            ]
        },
        {
            day: 3, date: "JUNE 12", title: "PERINEUM, PREGNANCY, PLACENTA & BREAST", icon: "🩺",
            lectures: [
                { id: "L45", code: "L45", subject: "Anatomy", title: "Perineum part 1", link: "https://t.me/c/2366096034/5723/6300" },
                { id: "L47", code: "L47", subject: "Anatomy", title: "Perineum part 2", link: "https://t.me/c/2366096034/5723/6332" },
                { id: "L33", code: "L33", subject: "Physiology", title: "Physiology of female reproduction, mammary glands", link: "https://t.me/c/2366096034/5723/6229" },
                { id: "L42", code: "L42", subject: "Pathology", title: "Pathology of breast diseases", link: "https://t.me/c/2366096034/5723/6273" },
                { id: "L44", code: "L44", subject: "Microbiology", title: "Congenital viral infection", link: "https://t.me/c/2366096034/5723/6281" },
                { id: "L46", code: "L46", subject: "Pharmacology", title: "Contraception", link: "https://t.me/c/2366096034/5723/6302" },
                { id: "L48", code: "L48", subject: "Pharmacology", title: "Drugs acting in uterus, ovulation", link: "https://t.me/c/2366096034/5723/6334" },
                { id: "L41", code: "L41", subject: "Histology", title: "Structure of placenta & mammary gland", link: "https://t.me/c/2366096034/5723/6272" },
                { id: "L43", code: "L43", subject: "Parasitology", title: "Trichomoniasis vaginalis & Carcinogenic parasitosis part 2", link: "https://t.me/c/2366096034/5723/6280" }
            ]
        }
    ];

    // --- نظام الوضع الليلي (Dark Mode) ---
    const themeToggle = document.getElementById('theme-toggle');
    const currentTheme = localStorage.getItem('theme') || 'light';
    
    if (currentTheme === 'dark') {
        document.body.classList.add('dark-mode');
        themeToggle.innerHTML = '☀️';
    } else {
        themeToggle.innerHTML = '🌙';
    }

    themeToggle.addEventListener('click', () => {
        document.body.classList.toggle('dark-mode');
        let theme = 'light';
        if (document.body.classList.contains('dark-mode')) {
            theme = 'dark';
            themeToggle.innerHTML = '☀️';
        } else {
            themeToggle.innerHTML = '🌙';
        }
        localStorage.setItem('theme', theme);
    });

    // Load saved progress from Local Storage for PAPER 2
    let savedProgress = JSON.parse(localStorage.getItem('urogenitalProgressPaper2')) || {};

    function saveProgress() {
        localStorage.setItem('urogenitalProgressPaper2', JSON.stringify(savedProgress));
        updateProgressBars();
    }

    function toggleCheckboxes(lecId, rowId) {
        const lecCheckbox = document.getElementById(lecId);
        const mcqCheckbox = document.getElementById(lecId + '_mcq');
        const row = document.getElementById(rowId);
        
        savedProgress[lecId] = lecCheckbox.checked;
        savedProgress[lecId + '_mcq'] = mcqCheckbox.checked;
        
        if (lecCheckbox.checked && mcqCheckbox.checked) {
            row.classList.add('completed');
        } else {
            row.classList.remove('completed');
        }
        
        saveProgress();
    }

    function updateProgressBars() {
        let totalTasks = 0;
        let completedTasks = 0;

        scheduleData.forEach(day => {
            let dayTotalTasks = day.lectures.length * 2;
            let dayCompletedTasks = 0;

            day.lectures.forEach(lec => {
                totalTasks += 2;
                
                if (savedProgress[lec.id]) {
                    completedTasks++;
                    dayCompletedTasks++;
                }
                if (savedProgress[lec.id + '_mcq']) {
                    completedTasks++;
                    dayCompletedTasks++;
                }
            });

            const dayBar = document.getElementById(`day-fill-${day.day}`);
            if(dayBar) {
                dayBar.style.width = `${(dayCompletedTasks / dayTotalTasks) * 100}%`;
            }
        });

        const overallPercentage = totalTasks === 0 ? 0 : Math.round((completedTasks / totalTasks) * 100);
        document.getElementById('overall-percentage').innerText = `${overallPercentage}%`;
        document.getElementById('overall-fill').style.width = `${overallPercentage}%`;
    }

    function renderSchedule() {
        const container = document.getElementById('schedule-container');
        container.innerHTML = ''; 
        
        scheduleData.forEach(day => {
            let rowsHtml = '';
            day.lectures.forEach(lec => {
                const isLecChecked = savedProgress[lec.id] ? 'checked' : '';
                const isMcqChecked = savedProgress[lec.id + '_mcq'] ? 'checked' : '';
                const completedClass = (isLecChecked && isMcqChecked) ? 'completed' : '';
                const subjectClass = `subject-${lec.subject.toLowerCase()}`;
                
                rowsHtml += `
                    <tr id="row-${lec.id}" class="${completedClass}">
                        <td class="checkbox-cell" title="Mark Lecture as Done">
                            <input type="checkbox" id="${lec.id}" class="check-lec" ${isLecChecked} 
                                onchange="toggleCheckboxes('${lec.id}', 'row-${lec.id}')">
                        </td>
                        <td class="checkbox-cell" title="Mark MCQs as Done">
                            <input type="checkbox" id="${lec.id}_mcq" class="check-mcq" ${isMcqChecked} 
                                onchange="toggleCheckboxes('${lec.id}', 'row-${lec.id}')">
                        </td>
                        <td style="font-weight: 600; color: var(--text-muted);">${lec.code}</td>
                        <td><span class="badge ${subjectClass}">${lec.subject}</span></td>
                        <td><a href="${lec.link}" target="_blank" class="lecture-link">${lec.title}</a></td>
                    </tr>
                `;
            });

            const dayHTML = `
                <div class="day-section">
                    <div class="day-card">
                        <div class="day-number">DAY ${day.day}</div>
                        <div class="day-date">${day.date}</div>
                        <div class="day-icon">${day.icon}</div>
                        <div class="progress-bar-bg" style="width: 100%; height: 8px; margin-top: 15px;">
                            <div class="progress-bar-fill" id="day-fill-${day.day}"></div>
                        </div>
                    </div>
                    <div class="schedule-card">
                        <div class="schedule-header">
                            <h3>${day.title}</h3>
                        </div>
                        <table class="lecture-table">
                            <thead>
                                <tr>
                                    <th>📚 Lec</th>
                                    <th>✅ MCQ</th>
                                    <th>Lec. No.</th>
                                    <th>Subject</th>
                                    <th>Title (Click to open)</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${rowsHtml}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
            container.innerHTML += dayHTML;
        });

        updateProgressBars();
    }

    // --- نظام الأذكار التلقائي ---
    const athkar = [
        "صلِّ على النبي ﷺ",
        "سبحان الله وبحمده، سبحان الله العظيم",
        "استغفر الله العظيم وأتوب إليه",
        "لا حول ولا قوة إلا بالله",
        "اللهم صلِّ وسلم وبارك على نبينا محمد",
        "الحمد لله دائمًا وأبدًا",
        "لا إله إلا أنت سبحانك إني كنت من الظالمين",
        "حسبي الله لا إله إلا هو عليه توكلت وهو رب العرش العظيم",
        "قال رسول الله ﷺ: «كلمتان خفيفتان على اللسان، ثقيلتان في الميزان: سبحان الله وبحمده، سبحان الله العظيم»",
        "اللهم إني أسألك علماً نافعاً، ورزقاً طيباً، وعملاً متقبلاً"
    ];

    function showThikr() {
        const container = document.getElementById('toast-container');
        if (!container) return;

        const toast = document.createElement('div');
        toast.className = 'toast';
        
        const randomThikr = athkar[Math.floor(Math.random() * athkar.length)];
        toast.innerText = randomThikr;

        container.appendChild(toast);

        setTimeout(() => {
            toast.classList.add('show');
        }, 100);

        setTimeout(() => {
            toast.classList.remove('show');
            setTimeout(() => {
                toast.remove();
            }, 500);
        }, 8000);
    }

    // يظهر كل 5 دقائق
    setInterval(showThikr, 300000); 

    // أول ذكر بعد 10 ثوانٍ كترحيب
    setTimeout(showThikr, 10000);

    // Initialize
    window.onload = renderSchedule;
</script>
