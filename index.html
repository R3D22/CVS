<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Endocrine Module Planner</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Light Mode Variables */
            --bg-color: #f8faf9;
            --card-bg: #ffffff;
            --primary-green: #145a32;
            --mcq-orange: #e67e22;
            --border-color: #e0e6e3;
            --text-dark: #1a1a1a;
            --text-muted: #666666;
            --hover-bg: #f4f7f5;
            --progress-bg: #e9ecef;
            --icon-color: #145a32;
            --icon-accent: #e67e22;
            
            /* Subject Colors - Light */
            --c-anatomy: #e8f5e9; --t-anatomy: #2e7d32;
            --c-histology: #f3e5f5; --t-histology: #7b1fa2;
            --c-physiology: #e3f2fd; --t-physiology: #1976d2;
            --c-pathology: #fff3e0; --t-pathology: #e65100;
            --c-microbiology: #e0f2f1; --t-microbiology: #00796b;
            --c-pharmacology: #ffebee; --t-pharmacology: #c62828;
            --c-parasitology: #fffde7; --t-parasitology: #fbc02d;
            --c-biochemistry: #e8eaf6; --t-biochemistry: #3f51b5; /* Elegant Indigo */
        }

        /* Dark Mode Variables */
        body.dark-mode {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --primary-green: #4caf50;
            --mcq-orange: #f39c12;
            --border-color: #333333;
            --text-dark: #f5f5f5;
            --text-muted: #aaaaaa;
            --hover-bg: #2a2a2a;
            --progress-bg: #333333;
            --icon-color: #4caf50;
            --icon-accent: #f39c12;
            
            /* Subject Colors - Dark */
            --c-anatomy: rgba(46, 125, 50, 0.2);     --t-anatomy: #81c784;
            --c-histology: rgba(123, 31, 162, 0.2);  --t-histology: #ce93d8;
            --c-physiology: rgba(25, 118, 210, 0.2); --t-physiology: #90caf9;
            --c-pathology: rgba(230, 81, 0, 0.2);    --t-pathology: #ffb74d;
            --c-microbiology: rgba(0, 121, 107, 0.2);--t-microbiology: #80cbc4;
            --c-pharmacology: rgba(198, 40, 40, 0.2);--t-pharmacology: #ef9a9a;
            --c-parasitology: rgba(251, 192, 45, 0.2);--t-parasitology: #fff59d;
            --c-biochemistry: rgba(63, 81, 181, 0.2); --t-biochemistry: #9fa8da;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-dark);
            padding: 20px;
            line-height: 1.6;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding-bottom: 40px;
        }

        /* Header Styles */
        .header {
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--primary-green);
            position: relative;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 15px;
        }

        .theme-toggle {
            background: var(--card-bg);
            color: var(--text-dark);
            border: 1px solid var(--border-color);
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .theme-toggle:hover {
            border-color: var(--primary-green);
            transform: scale(1.05);
        }

        .univ-title {
            font-size: 0.9rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .main-title {
            font-size: 2.5rem;
            color: var(--primary-green);
            font-weight: 700;
            margin-top: 15px;
        }

        .subtitle {
            font-size: 1.2rem;
            color: var(--text-muted);
            margin-bottom: 10px;
        }

        /* Overall Progress */
        .overall-progress-container {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            margin-bottom: 30px;
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-weight: 600;
            color: var(--primary-green);
        }

        .progress-bar-bg {
            background-color: var(--progress-bg);
            height: 12px;
            border-radius: 10px;
            overflow: hidden;
            transition: background-color 0.3s ease;
        }

        .progress-bar-fill {
            background-color: var(--primary-green);
            height: 100%;
            width: 0%;
            transition: width 0.5s ease-in-out, background-color 0.3s ease;
        }

        /* Day Layout */
        .day-section {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 24px;
            margin-bottom: 30px;
        }

        .day-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: transform 0.2s, background-color 0.3s ease, border-color 0.3s ease;
        }

        .day-card:hover {
            transform: translateY(-2px);
        }

        .day-number {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary-green);
        }

        .day-date {
            color: var(--text-muted);
            margin-bottom: 15px;
        }

        .day-icon {
            margin: 15px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 70px;
            height: 70px;
        }

        .schedule-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }

        .schedule-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
        }

        .schedule-header h3 {
            color: var(--primary-green);
            font-size: 1.3rem;
        }

        /* Table Styles */
        .lecture-table {
            width: 100%;
            border-collapse: collapse;
        }

        .lecture-table th {
            font-size: 0.9rem;
            color: var(--text-muted);
            padding: 12px;
            text-align: left;
            border-bottom: 2px solid var(--border-color);
        }
        
        .lecture-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }

        .lecture-table tr {
            transition: background-color 0.2s, opacity 0.3s;
        }

        .lecture-table tr:hover {
            background-color: var(--hover-bg);
        }

        .lecture-table tr.completed td {
            opacity: 0.4;
        }
        
        .lecture-table tr.completed td:not(:first-child):not(:nth-child(2)) {
            text-decoration: line-through;
        }

        .checkbox-cell {
            width: 50px;
            text-align: center !important;
        }

        input[type="checkbox"] {
            width: 22px;
            height: 22px;
            cursor: pointer;
        }

        .check-lec { accent-color: var(--primary-green); }
        .check-mcq { accent-color: var(--mcq-orange); }

        /* Lecture Links */
        .lecture-link {
            color: var(--text-dark);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
            display: inline-block;
            width: 100%;
        }

        .lecture-link[href="#"]:hover {
            text-decoration: none;
            cursor: default;
            color: var(--text-dark);
        }

        .lecture-link:not([href="#"]):hover {
            color: var(--primary-green);
            text-decoration: underline;
        }

        /* Subject Badges */
        .badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            display: inline-block;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .subject-anatomy { background-color: var(--c-anatomy); color: var(--t-anatomy); }
        .subject-histology { background-color: var(--c-histology); color: var(--t-histology); }
        .subject-physiology { background-color: var(--c-physiology); color: var(--t-physiology); }
        .subject-pathology { background-color: var(--c-pathology); color: var(--t-pathology); }
        .subject-microbiology { background-color: var(--c-microbiology); color: var(--t-microbiology); }
        .subject-pharmacology { background-color: var(--c-pharmacology); color: var(--t-pharmacology); }
        .subject-parasitology { background-color: var(--c-parasitology); color: var(--t-parasitology); }
        .subject-biochemistry { background-color: var(--c-biochemistry); color: var(--t-biochemistry); }

        /* Footer */
        .footer {
            text-align: center;
            margin-top: 50px;
            padding: 30px;
            border-top: 1px solid var(--border-color);
            color: var(--primary-green);
            font-size: 1.2rem;
            letter-spacing: 10px;
        }

        /* Toast Notifications Styles */
        #toast-container {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .toast {
            background-color: var(--primary-green);
            color: white;
            padding: 16px 24px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
            font-size: 1.1rem;
            font-weight: 600;
            opacity: 0;
            transform: translateX(100%);
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            direction: rtl;
            text-align: right;
            border-right: 6px solid #fbc02d;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(0);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .day-section {
                grid-template-columns: 1fr;
            }
            .day-card {
                flex-direction: row;
                justify-content: space-around;
                padding: 15px;
            }
            .day-icon {
                margin: 0;
                width: 50px;
                height: 50px;
            }
            .lecture-table th {
                display: none;
            }
            .lecture-table td {
                display: block;
                padding: 5px 10px;
                border: none;
                text-align: left !important;
            }
            .lecture-table td.checkbox-cell {
                display: inline-block;
                width: auto;
                margin-right: 15px;
            }
            .lecture-table tr {
                display: block;
                border-bottom: 1px solid var(--border-color);
                padding: 10px 0;
            }
            .header-top {
                flex-direction: row;
                align-items: center;
            }
            #toast-container {
                bottom: 20px;
                right: 20px;
                left: 20px;
            }
            .toast {
                text-align: center;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="header-top">
            <div>
                <div class="univ-title">New Mansoura University • Mansoura Integrated Medical Program</div>
                <div class="univ-title" style="color: var(--primary-green); font-weight: 600;">Dr. R3d</div>
            </div>
            <button id="theme-toggle" class="theme-toggle">🌙</button>
        </div>
        <h1 class="main-title">ENDOCRINE SYSTEM MODULE</h1>
        <p class="subtitle">COMPREHENSIVE STUDY PLAN: DAILY ORGANIZATION</p>
    </div>

    <div class="overall-progress-container">
        <div class="progress-header">
            <span>Overall Plan Completion (Lectures & MCQs)</span>
            <span id="overall-percentage">0%</span>
        </div>
        <div class="progress-bar-bg">
            <div class="progress-bar-fill" id="overall-fill"></div>
        </div>
    </div>

    <div id="schedule-container">
        <!-- Content will be generated by JavaScript -->
    </div>

    <div class="footer">
        🩺 🧠 💊 🩸 🧬 🧪
    </div>
</div>

<div id="toast-container"></div>

<script>
    // Premium Medical Line-Art SVGs for Endocrine System
    const pituitarySvg = `<svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" style="width:100%; height:100%;">
        <path d="M40 14C34 10 26 10 20 16C16 20 12 28 14 36C16 44 24 50 34 50C44 50 50 44 52 36C54 28 50 18 40 14Z" stroke="var(--icon-color)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M28 42C28 46 30 48 32 48C34 48 36 46 36 42" stroke="var(--icon-accent)" stroke-width="3" stroke-linecap="round"/>
        <circle cx="32" cy="46" r="2" fill="var(--icon-accent)"/>
    </svg>`;

    const thyroidSvg = `<svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" style="width:100%; height:100%;">
        <path d="M26 12H38M26 20H38M26 44H38M26 52H38" stroke="var(--icon-color)" stroke-width="2" stroke-linecap="round"/>
        <path d="M26 10V54M38 10V54" stroke="var(--icon-color)" stroke-width="2" stroke-linecap="round"/>
        <path d="M26 26C20 24 14 26 12 32C10 38 14 46 22 42C24 41 26 38 26 36V26Z" fill="var(--icon-accent)" fill-opacity="0.2" stroke="var(--icon-accent)" stroke-width="2.5" stroke-linejoin="round"/>
        <path d="M38 26C44 24 50 26 52 32C54 38 50 46 42 42C40 41 38 38 38 36V26Z" fill="var(--icon-accent)" fill-opacity="0.2" stroke="var(--icon-accent)" stroke-width="2.5" stroke-linejoin="round"/>
        <path d="M26 36H38V40H26V36Z" fill="var(--icon-accent)" stroke="var(--icon-accent)" stroke-width="2"/>
    </svg>`;

    const adrenalSvg = `<svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" style="width:100%; height:100%;">
        <path d="M14 42C10 36 12 26 20 24C28 22 30 30 26 36C24 39 20 40 18 42C16 43 15 44 14 42Z" stroke="var(--icon-color)" stroke-width="2.5" stroke-linejoin="round"/>
        <path d="M50 42C54 36 52 26 44 24C36 22 34 30 38 36C40 39 44 40 46 42C48 43 49 44 50 42Z" stroke="var(--icon-color)" stroke-width="2.5" stroke-linejoin="round"/>
        <path d="M14 22L18 14L26 18Z" fill="var(--icon-accent)" stroke="var(--icon-accent)" stroke-width="2" stroke-linejoin="round"/>
        <path d="M50 22L46 14L38 18Z" fill="var(--icon-accent)" stroke="var(--icon-accent)" stroke-width="2" stroke-linejoin="round"/>
    </svg>`;

    const scheduleData = [
        {
            day: 1, date: "JUNE 26", title: "PITUITARY GLAND & METABOLISM", icon: pituitarySvg,
            lectures: [
                { id: "L1_A", code: "L1", subject: "Anatomy", title: "Anatomy & Development of the Pituitary Gland", link: "https://t.me/c/2366096034/5428/5441" },
                { id: "L3_H", code: "L3", subject: "Histology", title: "Structure of Pituitary Gland & Pineal Body", link: "https://t.me/c/2366096034/5428/5459" },
                { id: "L2_B", code: "L2", subject: "Biochemistry", title: "Hormone Structure & Ligand-Receptor Interactions", link: "https://t.me/c/2366096034/5428/5457" },
                { id: "L4_P", code: "L4", subject: "Physiology", title: "Introduction & Control + Posterior Pituitary Gland", link: "https://t.me/c/2366096034/5428/5461" },
                { id: "L5_P", code: "L5", subject: "Physiology", title: "Physiology of Anterior Pituitary Gland + Physiology of Growth", link: "https://t.me/c/2366096034/5428/5465" },
                { id: "L6_Pa", code: "L6", subject: "Pathology", title: "Pituitary Lesions", link: "https://t.me/c/2366096034/5428/5468" },
                { id: "S1_P", code: "S1", subject: "Physiology", title: "Metabolic Rate", link: "https://t.me/c/2366096034/5501/5643" },
                { id: "L15_P", code: "L15", subject: "Physiology", title: "Regulation of Body Temperature", link: "https://t.me/c/2366096034/5428/5625" },
                { id: "L12_Ph", code: "L12", subject: "Pharmacology", title: "Pharmacology of Thyroid Hormones Related Disorders", link: "https://t.me/c/2366096034/5428/5543" }
            ]
        },
        {
            day: 2, date: "JUNE 27", title: "THYROID, PARATHYROID & ENDOCRINE PANCREAS", icon: thyroidSvg,
            lectures: [
                { id: "L8_A", code: "L8", subject: "Anatomy", title: "Anatomy & Development of the Thyroid and Parathyroid Glands", link: "https://t.me/c/2366096034/5428/5471" },
                { id: "L9_H", code: "L9", subject: "Histology", title: "Structure of Thyroid & Parathyroid Glands", link: "https://t.me/c/2366096034/5428/5538" },
                { id: "L7_B", code: "L7", subject: "Biochemistry", title: "Thyroid Hormone Synthesis & Metabolism", link: "https://t.me/c/2366096034/5428/5470" },
                { id: "L10_P", code: "L10", subject: "Physiology", title: "Physiology of Thyroid Gland", link: "https://t.me/c/2366096034/5428/5539" },
                { id: "L17_P", code: "L17", subject: "Physiology", title: "Endocrine Regulation of Ca & Ph Metabolism", link: "https://t.me/c/2366096034/5428/5629" },
                { id: "L11_Pa", code: "L11", subject: "Pathology", title: "Thyroid Lesions", link: "https://t.me/c/2366096034/5428/5542" },
                { id: "L18_P", code: "L18", subject: "Physiology", title: "Endocrine Regulation of Blood Glucose", link: "https://t.me/c/2366096034/5428/5651" },
                { id: "L19_Pa", code: "L19", subject: "Pathology", title: "Pathology of Endocrine Pancreas", link: "https://t.me/c/2366096034/5428/5653" },
                { id: "L16_Ph", code: "L16", subject: "Pharmacology", title: "Anti-diabetic Drugs (Insulin)", link: "https://t.me/c/2366096034/5428/5626" }
            ]
        },
        {
            day: 3, date: "JUNE 28", title: "ADRENAL GLAND & PHARMACOLOGY", icon: adrenalSvg,
            lectures: [
                { id: "L21_Ph", code: "L21", subject: "Pharmacology", title: "Anti-diabetic Drugs (Oral Anti-diabetics)", link: "https://t.me/c/2366096034/5428/5664" },
                { id: "L13_A", code: "L13", subject: "Anatomy", title: "Anatomy & Development of the Pancreas & Suprarenal Gland", link: "https://t.me/c/2366096034/5428/5576" },
                { id: "L14_H", code: "L14", subject: "Histology", title: "Structure of Adrenal Gland & DNES (Types & Structure)", link: "https://t.me/c/2366096034/5428/5584" },
                { id: "S2_B", code: "S2", subject: "Biochemistry", title: "Adrenal Hormone Synthesis & Metabolism", link: "https://t.me/c/2366096034/5501/5648" },
                { id: "L20_P", code: "L20", subject: "Physiology", title: "Physiology of Adrenal Cortex", link: "https://t.me/c/2366096034/5428/5654" },
                { id: "L22_P", code: "L22", subject: "Physiology", title: "Physiology of Adrenal Medulla", link: "https://t.me/c/2366096034/5428/5665" },
                { id: "L23_Pa", code: "L23", subject: "Pathology", title: "Pathology of Adrenal Lesions", link: "https://t.me/c/2366096034/5428/5690" },
                { id: "L24_Ph", code: "L24", subject: "Pharmacology", title: "Pharmacology of Adrenocortical Steroids (Glucocorticoids + Mineralocorticoids)", link: "https://t.me/c/2366096034/5428/5691" },
                { id: "S3_P", code: "S3", subject: "Physiology", title: "Energy Required During Exercise", link: "#" }
            ]
        }
    ];

    // --- نظام الوضع الليلي (Dark Mode) ---
    const themeToggle = document.getElementById('theme-toggle');
    const currentTheme = localStorage.getItem('theme') || 'light';
    
    if (currentTheme === 'dark') {
        document.body.classList.add('dark-mode');
        themeToggle.innerHTML = '☀️';
    } else {
        themeToggle.innerHTML = '🌙';
    }

    themeToggle.addEventListener('click', () => {
        document.body.classList.toggle('dark-mode');
        let theme = 'light';
        if (document.body.classList.contains('dark-mode')) {
            theme = 'dark';
            themeToggle.innerHTML = '☀️';
        } else {
            themeToggle.innerHTML = '🌙';
        }
        localStorage.setItem('theme', theme);
    });

    // Load saved progress from Local Storage for ENDOCRINE MODULE
    let savedProgress = JSON.parse(localStorage.getItem('endoProgress')) || {};

    function saveProgress() {
        localStorage.setItem('endoProgress', JSON.stringify(savedProgress));
        updateProgressBars();
    }

    function toggleCheckboxes(lecId, rowId) {
        const lecCheckbox = document.getElementById(lecId);
        const mcqCheckbox = document.getElementById(lecId + '_mcq');
        const row = document.getElementById(rowId);
        
        savedProgress[lecId] = lecCheckbox.checked;
        savedProgress[lecId + '_mcq'] = mcqCheckbox.checked;
        
        if (lecCheckbox.checked && mcqCheckbox.checked) {
            row.classList.add('completed');
        } else {
            row.classList.remove('completed');
        }
        
        saveProgress();
    }

    function updateProgressBars() {
        let totalTasks = 0;
        let completedTasks = 0;

        scheduleData.forEach(day => {
            let dayTotalTasks = day.lectures.length * 2;
            let dayCompletedTasks = 0;

            day.lectures.forEach(lec => {
                totalTasks += 2;
                
                if (savedProgress[lec.id]) {
                    completedTasks++;
                    dayCompletedTasks++;
                }
                if (savedProgress[lec.id + '_mcq']) {
                    completedTasks++;
                    dayCompletedTasks++;
                }
            });

            const dayBar = document.getElementById(`day-fill-${day.day}`);
            if(dayBar) {
                dayBar.style.width = `${(dayCompletedTasks / dayTotalTasks) * 100}%`;
            }
        });

        const overallPercentage = totalTasks === 0 ? 0 : Math.round((completedTasks / totalTasks) * 100);
        document.getElementById('overall-percentage').innerText = `${overallPercentage}%`;
        document.getElementById('overall-fill').style.width = `${overallPercentage}%`;
    }

    function renderSchedule() {
        const container = document.getElementById('schedule-container');
        container.innerHTML = ''; 
        
        scheduleData.forEach(day => {
            let rowsHtml = '';
            day.lectures.forEach(lec => {
                const isLecChecked = savedProgress[lec.id] ? 'checked' : '';
                const isMcqChecked = savedProgress[lec.id + '_mcq'] ? 'checked' : '';
                const completedClass = (isLecChecked && isMcqChecked) ? 'completed' : '';
                const subjectClass = `subject-${lec.subject.toLowerCase()}`;
                
                rowsHtml += `
                    <tr id="row-${lec.id}" class="${completedClass}">
                        <td class="checkbox-cell" title="Mark Lecture as Done">
                            <input type="checkbox" id="${lec.id}" class="check-lec" ${isLecChecked} 
                                onchange="toggleCheckboxes('${lec.id}', 'row-${lec.id}')">
                        </td>
                        <td class="checkbox-cell" title="Mark MCQs as Done">
                            <input type="checkbox" id="${lec.id}_mcq" class="check-mcq" ${isMcqChecked} 
                                onchange="toggleCheckboxes('${lec.id}', 'row-${lec.id}')">
                        </td>
                        <td style="font-weight: 600; color: var(--text-muted);">${lec.code}</td>
                        <td><span class="badge ${subjectClass}">${lec.subject}</span></td>
                        <td><a href="${lec.link}" target="_blank" class="lecture-link">${lec.title}</a></td>
                    </tr>
                `;
            });

            const dayHTML = `
                <div class="day-section">
                    <div class="day-card">
                        <div class="day-number">DAY ${day.day}</div>
                        <div class="day-date">${day.date}</div>
                        <div class="day-icon">${day.icon}</div>
                        <div class="progress-bar-bg" style="width: 100%; height: 8px; margin-top: 15px;">
                            <div class="progress-bar-fill" id="day-fill-${day.day}"></div>
                        </div>
                    </div>
                    <div class="schedule-card">
                        <div class="schedule-header">
                            <h3>${day.title}</h3>
                        </div>
                        <table class="lecture-table">
                            <thead>
                                <tr>
                                    <th>📚 Lec</th>
                                    <th>✅ MCQ</th>
                                    <th>Lec. No.</th>
                                    <th>Subject</th>
                                    <th>Title (Click to open)</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${rowsHtml}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
            container.innerHTML += dayHTML;
        });

        updateProgressBars();
    }

    // --- نظام الأذكار التلقائي ---
    const athkar = [
        "صلِّ على النبي ﷺ",
        "سبحان الله وبحمده، سبحان الله العظيم",
        "استغفر الله العظيم وأتوب إليه",
        "لا حول ولا قوة إلا بالله",
        "اللهم صلِّ وسلم وبارك على نبينا محمد",
        "الحمد لله دائمًا وأبدًا",
        "لا إله إلا أنت سبحانك إني كنت من الظالمين",
        "حسبي الله لا إله إلا هو عليه توكلت وهو رب العرش العظيم",
        "قال رسول الله ﷺ: «كلمتان خفيفتان على اللسان، ثقيلتان في الميزان: سبحان الله وبحمده، سبحان الله العظيم»",
        "اللهم إني أسألك علماً نافعاً، ورزقاً طيباً، وعملاً متقبلاً"
    ];

    function showThikr() {
        const container = document.getElementById('toast-container');
        if (!container) return;

        const toast = document.createElement('div');
        toast.className = 'toast';
        
        const randomThikr = athkar[Math.floor(Math.random() * athkar.length)];
        toast.innerText = randomThikr;

        container.appendChild(toast);

        setTimeout(() => {
            toast.classList.add('show');
        }, 100);

        setTimeout(() => {
            toast.classList.remove('show');
            setTimeout(() => {
                toast.remove();
            }, 500);
        }, 8000);
    }

    // يظهر كل 5 دقائق
    setInterval(showThikr, 300000); 

    // أول ذكر بعد 10 ثوانٍ كترحيب
    setTimeout(showThikr, 10000);

    window.onload = renderSchedule;
</script>

</body>
</html>
