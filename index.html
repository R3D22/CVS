<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical Modules Planner</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Light Mode Variables */
            --bg-color: #f8faf9;
            --card-bg: #ffffff;
            --primary-green: #145a32;
            --mcq-orange: #e67e22;
            --border-color: #e0e6e3;
            --text-dark: #1a1a1a;
            --text-muted: #666666;
            --hover-bg: #f4f7f5;
            --progress-bg: #e9ecef;
            --icon-color: #b71c1c; 
            --icon-accent: #e53935;
            
            /* Subject Colors - Light */
            --c-anatomy: #e8f5e9; --t-anatomy: #2e7d32;
            --c-histology: #f3e5f5; --t-histology: #7b1fa2;
            --c-physiology: #e3f2fd; --t-physiology: #1976d2;
            --c-pathology: #fff3e0; --t-pathology: #e65100;
            --c-microbiology: #e0f2f1; --t-microbiology: #00796b;
            --c-pharmacology: #ffebee; --t-pharmacology: #c62828;
            --c-parasitology: #fffde7; --t-parasitology: #fbc02d;
            --c-biochemistry: #e8eaf6; --t-biochemistry: #3f51b5; 
        }

        body.dark-mode {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --primary-green: #e53935; 
            --mcq-orange: #f39c12;
            --border-color: #333333;
            --text-dark: #f5f5f5;
            --text-muted: #aaaaaa;
            --hover-bg: #2a2a2a;
            --progress-bg: #333333;
            --icon-color: #ef5350;
            --icon-accent: #ff8a80;
            
            /* Subject Colors - Dark */
            --c-anatomy: rgba(46, 125, 50, 0.2);     --t-anatomy: #81c784;
            --c-histology: rgba(123, 31, 162, 0.2);  --t-histology: #ce93d8;
            --c-physiology: rgba(25, 118, 210, 0.2); --t-physiology: #90caf9;
            --c-pathology: rgba(230, 81, 0, 0.2);    --t-pathology: #ffb74d;
            --c-microbiology: rgba(0, 121, 107, 0.2);--t-microbiology: #80cbc4;
            --c-pharmacology: rgba(198, 40, 40, 0.2);--t-pharmacology: #ef9a9a;
            --c-parasitology: rgba(251, 192, 45, 0.2);--t-parasitology: #fff59d;
            --c-biochemistry: rgba(63, 81, 181, 0.2); --t-biochemistry: #9fa8da;
        }

        /* Responsive Respiratory Color Overrides in Dark Mode */
        body.dark-mode.theme-resp {
            --primary-green: #0288d1;
            --icon-color: #03a9f4;
            --icon-accent: #81d4fa;
        }
        body.theme-resp {
            --primary-green: #01579b;
            --icon-color: #0277bd;
            --icon-accent: #039be5;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-dark);
            padding: 20px;
            line-height: 1.6;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding-bottom: 40px;
        }

        .header {
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--primary-green);
            position: relative;
            transition: border-color 0.3s ease;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 15px;
        }

        .theme-toggle {
            background: var(--card-bg);
            color: var(--text-dark);
            border: 1px solid var(--border-color);
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .theme-toggle:hover {
            border-color: var(--primary-green);
            transform: scale(1.05);
        }

        .univ-title {
            font-size: 0.9rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .main-title {
            font-size: 2.5rem;
            color: var(--primary-green);
            font-weight: 700;
            margin-top: 15px;
            transition: color 0.3s ease;
        }

        .subtitle {
            font-size: 1.2rem;
            color: var(--text-muted);
            margin-bottom: 10px;
        }

        /* Tabs Styling */
        .module-tabs {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 12px 24px;
            border-radius: 30px;
            border: 2px solid var(--border-color);
            background: var(--card-bg);
            color: var(--text-muted);
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tab-btn:hover {
            border-color: var(--primary-green);
            color: var(--text-dark);
        }

        .tab-btn.active {
            border-color: var(--primary-green);
            background: var(--primary-green);
            color: #ffffff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .overall-progress-container {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            margin-bottom: 30px;
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-weight: 600;
            color: var(--primary-green);
        }

        .progress-bar-bg {
            background-color: var(--progress-bg);
            height: 12px;
            border-radius: 10px;
            overflow: hidden;
            transition: background-color 0.3s ease;
        }

        .progress-bar-fill {
            background-color: var(--primary-green);
            height: 100%;
            width: 0%;
            transition: width 0.5s ease-in-out, background-color 0.3s ease;
        }

        .day-section {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 24px;
            margin-bottom: 30px;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .day-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: transform 0.2s, background-color 0.3s ease, border-color 0.3s ease;
        }

        .day-card:hover {
            transform: translateY(-2px);
        }

        .day-number {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary-green);
            transition: color 0.3s ease;
        }

        .day-date {
            color: var(--text-muted);
            margin-bottom: 15px;
            font-weight: 500;
        }

        .day-icon {
            margin: 15px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 70px;
            height: 70px;
        }

        .schedule-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            transition: background-color 0.3s ease, border-color 0.3s ease;
            overflow-x: auto;
        }

        .lecture-table {
            width: 100%;
            border-collapse: collapse;
        }

        .lecture-table th {
            font-size: 0.9rem;
            color: var(--text-muted);
            padding: 12px;
            text-align: left;
            border-bottom: 2px solid var(--border-color);
        }
        
        .lecture-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }

        .lecture-table tr {
            transition: background-color 0.2s, opacity 0.3s;
        }

        .lecture-table tr:hover {
            background-color: var(--hover-bg);
        }

        .lecture-table tr.completed td {
            opacity: 0.4;
        }
        
        .lecture-table tr.completed td:not(:first-child):not(:nth-child(2)) {
            text-decoration: line-through;
        }

        .checkbox-cell {
            width: 50px;
            text-align: center !important;
        }

        input[type="checkbox"] {
            width: 22px;
            height: 22px;
            cursor: pointer;
        }

        .check-lec { accent-color: var(--primary-green); }
        .check-mcq { accent-color: var(--mcq-orange); }

        .lecture-link {
            color: var(--text-dark);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
            display: inline-block;
            width: 100%;
        }

        .lecture-link[href="#"]:hover {
            text-decoration: none;
            cursor: default;
            color: var(--text-dark);
        }

        .lecture-link:not([href="#"]):hover {
            color: var(--primary-green);
            text-decoration: underline;
        }

        .badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            display: inline-block;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .subject-anatomy { background-color: var(--c-anatomy); color: var(--t-anatomy); }
        .subject-histology { background-color: var(--c-histology); color: var(--t-histology); }
        .subject-physiology { background-color: var(--c-physiology); color: var(--t-physiology); }
        .subject-pathology { background-color: var(--c-pathology); color: var(--t-pathology); }
        .subject-microbiology { background-color: var(--c-microbiology); color: var(--t-microbiology); }
        .subject-pharmacology { background-color: var(--c-pharmacology); color: var(--t-pharmacology); }
        .subject-parasitology { background-color: var(--c-parasitology); color: var(--t-parasitology); }
        .subject-biochemistry { background-color: var(--c-biochemistry); color: var(--t-biochemistry); }

        .footer {
            text-align: center;
            margin-top: 50px;
            padding: 30px;
            border-top: 1px solid var(--border-color);
            color: var(--primary-green);
            font-size: 1.2rem;
            letter-spacing: 10px;
        }

        /* Toast Notifications Styles (Teal Color) */
        #toast-container {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .toast {
            background-color: #0f766e; /* Teal */
            color: white;
            padding: 16px 24px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
            font-size: 1.1rem;
            font-weight: 600;
            opacity: 0;
            transform: translateX(100%);
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            direction: rtl;
            text-align: right;
            border-right: 6px solid #fbc02d;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(0);
        }

        @media (max-width: 768px) {
            .day-section {
                grid-template-columns: 1fr;
            }
            .day-card {
                flex-direction: row;
                justify-content: space-around;
                padding: 15px;
            }
            .day-icon {
                margin: 0;
                width: 50px;
                height: 50px;
            }
            .lecture-table th {
                display: none;
            }
            .lecture-table td {
                display: block;
                padding: 5px 10px;
                border: none;
                text-align: left !important;
            }
            .lecture-table td.checkbox-cell {
                display: inline-block;
                width: auto;
                margin-right: 15px;
            }
            .lecture-table tr {
                display: block;
                border-bottom: 1px solid var(--border-color);
                padding: 10px 0;
            }
            .header-top {
                flex-direction: row;
                align-items: center;
            }
            #toast-container {
                bottom: 20px;
                right: 20px;
                left: 20px;
            }
            .toast {
                text-align: center;
                font-size: 1rem;
            }
        }
    </style>
</head>

</div>

    let activeModule = 'cvs'; // Default

    // --- نظام الوضع الليلي (Dark Mode) ---
    const themeToggle = document.getElementById('theme-toggle');
    const currentTheme = localStorage.getItem('theme') || 'light';
    
    if (currentTheme === 'dark') {
        document.body.classList.add('dark-mode');
        themeToggle.innerHTML = '☀️';
    } else {
        themeToggle.innerHTML = '🌙';
    }

    themeToggle.addEventListener('click', () => {
        document.body.classList.toggle('dark-mode');
        let theme = 'light';
        if (document.body.classList.contains('dark-mode')) {
            theme = 'dark';
            themeToggle.innerHTML = '☀️';
        } else {
            themeToggle.innerHTML = '🌙';
        }
        localStorage.setItem('theme', theme);
    });

    // --- Data Persistence ---
    // Use a single object in localStorage to hold progress for ALL modules
    let savedProgress = JSON.parse(localStorage.getItem('medicalModulesProgress')) || { cvs: {}, resp: {} };
    
    // Migration: If user has old cvsProgress, move it to the new structure
    const oldCvsProgress = localStorage.getItem('cvsProgress');
    if (oldCvsProgress && Object.keys(savedProgress.cvs).length === 0) {
        savedProgress.cvs = JSON.parse(oldCvsProgress);
        localStorage.setItem('medicalModulesProgress', JSON.stringify(savedProgress));
    }

    function saveProgress() {
        localStorage.setItem('medicalModulesProgress', JSON.stringify(savedProgress));
        updateProgressBars();
    }

    function toggleCheckboxes(lecId, rowId) {
        const lecCheckbox = document.getElementById(lecId);
        const mcqCheckbox = document.getElementById(lecId + '_mcq');
        const row = document.getElementById(rowId);
        
        savedProgress[activeModule][lecId] = lecCheckbox.checked;
        savedProgress[activeModule][lecId + '_mcq'] = mcqCheckbox.checked;
        
        if (lecCheckbox.checked && mcqCheckbox.checked) {
            row.classList.add('completed');
        } else {
            row.classList.remove('completed');
        }
        
        saveProgress();
    }

    function updateProgressBars() {
        let totalTasks = 0;
        let completedTasks = 0;
        const currentData = modulesData[activeModule].weeks;

        currentData.forEach(weekData => {
            let weekTotalTasks = weekData.lectures.length * 2;
            let weekCompletedTasks = 0;

            weekData.lectures.forEach(lec => {
                totalTasks += 2;
                
                if (savedProgress[activeModule][lec.id]) {
                    completedTasks++;
                    weekCompletedTasks++;
                }
                if (savedProgress[activeModule][lec.id + '_mcq']) {
                    completedTasks++;
                    weekCompletedTasks++;
                }
            });

            const weekBar = document.getElementById(`week-fill-${weekData.week}`);
            if(weekBar) {
                weekBar.style.width = `${(weekCompletedTasks / weekTotalTasks) * 100}%`;
            }
        });

        const overallPercentage = totalTasks === 0 ? 0 : Math.round((completedTasks / totalTasks) * 100);
        document.getElementById('overall-percentage').innerText = `${overallPercentage}%`;
        document.getElementById('overall-fill').style.width = `${overallPercentage}%`;
    }

    function renderSchedule() {
        const container = document.getElementById('schedule-container');
        container.innerHTML = ''; 
        
        const currentData = modulesData[activeModule].weeks;

        currentData.forEach(weekData => {
            let rowsHtml = '';
            weekData.lectures.forEach(lec => {
                const isLecChecked = savedProgress[activeModule][lec.id] ? 'checked' : '';
                const isMcqChecked = savedProgress[activeModule][lec.id + '_mcq'] ? 'checked' : '';
                const completedClass = (isLecChecked && isMcqChecked) ? 'completed' : '';
                const subjectClass = `subject-${lec.subject.toLowerCase()}`;
                
                rowsHtml += `
                    <tr id="row-${lec.id}" class="${completedClass}">
                        <td class="checkbox-cell" title="Mark Lecture as Done">
                            <input type="checkbox" id="${lec.id}" class="check-lec" ${isLecChecked} 
                                onchange="toggleCheckboxes('${lec.id}', 'row-${lec.id}')">
                        </td>
                        <td class="checkbox-cell" title="Mark MCQs as Done">
                            <input type="checkbox" id="${lec.id}_mcq" class="check-mcq" ${isMcqChecked} 
                                onchange="toggleCheckboxes('${lec.id}', 'row-${lec.id}')">
                        </td>
                        <td style="font-weight: 600; color: var(--text-muted);">${lec.code}</td>
                        <td><span class="badge ${subjectClass}">${lec.subject}</span></td>
                        <td><a href="${lec.link}" target="_blank" class="lecture-link">${lec.title}</a></td>
                    </tr>
                `;
            });

            const weekCount = weekData.lectures.length;
            const weekHTML = `
                <div class="day-section">
                    <div class="day-card">
                        <div class="day-number">WEEK ${weekData.week}</div>
                        <div class="day-date">${weekCount} Lectures</div>
                        <div class="day-icon">${weekData.icon}</div>
                        <div class="progress-bar-bg" style="width: 100%; height: 8px; margin-top: 15px;">
                            <div class="progress-bar-fill" id="week-fill-${weekData.week}"></div>
                        </div>
                    </div>
                    <div class="schedule-card">
                        <table class="lecture-table">
                            <thead>
                                <tr>
                                    <th>📚 Lec</th>
                                    <th>✅ MCQ</th>
                                    <th>Lec. No.</th>
                                    <th>Subject</th>
                                    <th>Title</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${rowsHtml}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
            container.innerHTML += weekHTML;
        });

        updateProgressBars();
    }

    function switchModule(moduleKey) {
        activeModule = moduleKey;
        
        // Handle Tabs styling
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(`tab-${moduleKey}`).classList.add('active');

        // Handle Theme/Colors (Resp gets a slightly different blueish accent in dark mode)
        document.body.className = document.body.className.replace(/theme-\w+/g, '').trim();
        if (modulesData[moduleKey].themeClass) {
            document.body.classList.add(modulesData[moduleKey].themeClass);
        }

        // Update Text
        document.getElementById('page-main-title').innerText = modulesData[moduleKey].title;
        document.getElementById('page-subtitle').innerText = modulesData[moduleKey].subtitle;
        document.getElementById('footer-icons').innerText = modulesData[moduleKey].footerIcons;

        // Render Data
        renderSchedule();
    }

        "صلِّ على النبي ﷺ",
        "سبحان الله وبحمده، سبحان الله العظيم",
        "استغفر الله العظيم وأتوب إليه",
        "لا حول ولا قوة إلا بالله",
        "اللهم صلِّ وسلم وبارك على نبينا محمد",
        "الحمد لله دائمًا وأبدًا",
        "لا إله إلا أنت سبحانك إني كنت من الظالمين",
        "حسبي الله لا إله إلا هو عليه توكلت وهو رب العرش العظيم",
        "قال رسول الله ﷺ: «كلمتان خفيفتان على اللسان، ثقيلتان في الميزان: سبحان الله وبحمده، سبحان الله العظيم»",
        "اللهم إني أسألك علماً نافعاً، ورزقاً طيباً، وعملاً متقبلاً"
    ];

    function showThikr() {
        const container = document.getElementById('toast-container');
        if (!container) return;

        const toast = document.createElement('div');
        toast.className = 'toast';
        
        const randomThikr = athkar[Math.floor(Math.random() * athkar.length)];
        toast.innerText = randomThikr;

        container.appendChild(toast);

        setTimeout(() => {
            toast.classList.add('show');
        }, 100);

        setTimeout(() => {
            toast.classList.remove('show');
            setTimeout(() => {
                toast.remove();
            }, 500);
        }, 8000);
    }

    // يظهر كل 5 دقائق
    setInterval(showThikr, 300000); 
    setTimeout(showThikr, 10000);

    // Initial load
    switchModule('cvs'); // Loads CVS by default
