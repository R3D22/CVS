<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Urogenital Module Planner</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f8faf9;
            --card-bg: #ffffff;
            --primary-green: #145a32;
            --border-color: #e0e6e3;
            --text-dark: #1a1a1a;
            --text-muted: #666666;
            
            /* Subject Colors */
            --c-anatomy: #e8f5e9; --t-anatomy: #2e7d32;
            --c-histology: #f3e5f5; --t-histology: #7b1fa2;
            --c-physiology: #e3f2fd; --t-physiology: #1976d2;
            --c-pathology: #fff3e0; --t-pathology: #e65100;
            --c-microbiology: #e0f2f1; --t-microbiology: #00796b;
            --c-pharmacology: #ffebee; --t-pharmacology: #c62828;
            --c-parasitology: #fffde7; --t-parasitology: #fbc02d;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-dark);
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Header Styles */
        .header {
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--primary-green);
        }

        .univ-title {
            font-size: 0.9rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .main-title {
            font-size: 2.5rem;
            color: var(--primary-green);
            font-weight: 700;
        }

        .subtitle {
            font-size: 1.2rem;
            color: var(--text-muted);
            margin-bottom: 20px;
        }

        /* Overall Progress */
        .overall-progress-container {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            margin-bottom: 30px;
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-weight: 600;
            color: var(--primary-green);
        }

        .progress-bar-bg {
            background-color: #e9ecef;
            height: 12px;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-bar-fill {
            background-color: var(--primary-green);
            height: 100%;
            width: 0%;
            transition: width 0.5s ease-in-out;
        }

        /* Day Layout */
        .day-section {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 24px;
            margin-bottom: 30px;
        }

        .day-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: transform 0.2s;
        }

        .day-card:hover {
            transform: translateY(-2px);
        }

        .day-number {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary-green);
        }

        .day-date {
            color: var(--text-muted);
            margin-bottom: 15px;
        }

        .day-icon {
            font-size: 4rem;
            margin: 10px 0;
        }

        .schedule-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
        }

        .schedule-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
        }

        .schedule-header h3 {
            color: var(--primary-green);
            font-size: 1.3rem;
        }

        /* Table Styles */
        .lecture-table {
            width: 100%;
            border-collapse: collapse;
        }

        .lecture-table th, .lecture-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }

        .lecture-table tr {
            transition: background-color 0.2s;
        }

        .lecture-table tr:hover {
            background-color: #f8faf9;
        }

        .lecture-table tr.completed td {
            opacity: 0.5;
            text-decoration: line-through;
        }

        .checkbox-cell {
            width: 40px;
        }

        input[type="checkbox"] {
            width: 20px;
            height: 20px;
            accent-color: var(--primary-green);
            cursor: pointer;
        }

        /* Subject Badges */
        .badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            display: inline-block;
        }

        .subject-anatomy { background-color: var(--c-anatomy); color: var(--t-anatomy); }
        .subject-histology { background-color: var(--c-histology); color: var(--t-histology); }
        .subject-physiology { background-color: var(--c-physiology); color: var(--t-physiology); }
        .subject-pathology { background-color: var(--c-pathology); color: var(--t-pathology); }
        .subject-microbiology { background-color: var(--c-microbiology); color: var(--t-microbiology); }
        .subject-pharmacology { background-color: var(--c-pharmacology); color: var(--t-pharmacology); }
        .subject-parasitology { background-color: var(--c-parasitology); color: var(--t-parasitology); }

        /* Footer */
        .footer {
            text-align: center;
            margin-top: 50px;
            padding: 30px;
            border-top: 1px solid var(--border-color);
            color: var(--primary-green);
            font-size: 1.5rem;
            letter-spacing: 15px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .day-section {
                grid-template-columns: 1fr;
            }
            .day-card {
                flex-direction: row;
                justify-content: space-around;
                padding: 15px;
            }
            .day-icon {
                font-size: 2.5rem;
                margin: 0;
            }
            .lecture-table th {
                display: none;
            }
            .lecture-table td {
                display: block;
                padding: 5px 10px;
                border: none;
            }
            .lecture-table tr {
                display: block;
                border-bottom: 1px solid var(--border-color);
                padding: 10px 0;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="univ-title">New Mansoura University • Mansoura Integrated Medical Program</div>
        <div class="univ-title" style="color: var(--primary-green); font-weight: 600;">Dr. R3D </div>
        <h1 class="main-title">UROGENITAL MODULE</h1>
        <p class="subtitle">STUDY PLAN: TOPICAL ORGANIZATION</p>
    </div>

    <div class="overall-progress-container">
        <div class="progress-header">
            <span>Overall Module Completion</span>
            <span id="overall-percentage">0%</span>
        </div>
        <div class="progress-bar-bg">
            <div class="progress-bar-fill" id="overall-fill"></div>
        </div>
    </div>

    <div id="schedule-container">
        <!-- Content will be generated by JavaScript -->
    </div>

    <div class="footer">
        🩺 🔬 💊 🩸 🧬 🧪
    </div>
</div>

<script>
    const scheduleData = [
        {
            day: 1, date: "MAY 23", title: "URINARY SYSTEM & PELVIS", icon: "🧬",
            lectures: [
                { id: "d1-1", code: "L20", subject: "Physiology", title: "Physiology of micturition" },
                { id: "d1-2", code: "L26", subject: "Anatomy", title: "Pelvic wall, nerves & blood supply" },
                { id: "d1-3", code: "L22", subject: "Microbiology", title: "Infection of urinary system part 1" },
                { id: "d1-4", code: "L25", subject: "Microbiology", title: "Infection of urinary system part 2" }
            ]
        },
        {
            day: 2, date: "MAY 24", title: "MALE GENITAL SYSTEM", icon: "♂️",
            lectures: [
                { id: "d2-1", code: "L18", subject: "Anatomy", title: "Male genital system, spermatic cord & testis" },
                { id: "d2-2", code: "L19", subject: "Histology", title: "Structure of the testis, spermatogenesis" },
                { id: "d2-3", code: "L21", subject: "Histology", title: "Structure of male genital ducts & glands" },
                { id: "d2-4", code: "L23", subject: "Physiology", title: "Male reproductive system" },
                { id: "d2-5", code: "L24", subject: "Pathology", title: "Pathology of prostatic diseases" }
            ]
        },
        {
            day: 3, date: "MAY 25", title: "FEMALE ANATOMY & PERINEUM", icon: "♀️",
            lectures: [
                { id: "d3-1", code: "L28", subject: "Anatomy", title: "Female genital system" },
                { id: "d3-2", code: "L45", subject: "Anatomy", title: "Perineum part 1" },
                { id: "d3-3", code: "L47", subject: "Anatomy", title: "Perineum part 2" },
                { id: "d3-4", code: "L27", subject: "Histology", title: "Structure of the ovary, oviduct" },
                { id: "d3-5", code: "L29", subject: "Histology", title: "Histology of oviduct and uterus" },
                { id: "d3-6", code: "L31", subject: "Physiology", title: "Female reproductive system" }
            ]
        },
        {
            day: 4, date: "MAY 26", title: "FEMALE PATHOLOGY & HORMONES", icon: "🔬",
            lectures: [
                { id: "d4-1", code: "L33", subject: "Physiology", title: "Female reproduction, mammary glands" },
                { id: "d4-2", code: "L34", subject: "Pathology", title: "Pathology of ovarian diseases" },
                { id: "d4-3", code: "L38", subject: "Pathology", title: "Pathology of female genital uterus, vagina, vulva" },
                { id: "d4-4", code: "L35", subject: "Pharmacology", title: "Pharmacology of sex hormone part 1" },
                { id: "d4-5", code: "L39", subject: "Pharmacology", title: "Pharmacology of sex hormone part 2" }
            ]
        },
        {
            day: 5, date: "MAY 27", title: "INFECTIONS & CONTRACEPTION", icon: "🦠",
            lectures: [
                { id: "d5-1", code: "L30", subject: "Microbiology", title: "Genital system infections" },
                { id: "d5-2", code: "L36", subject: "Microbiology", title: "Viral genital infection" },
                { id: "d5-3", code: "L37", subject: "Parasitology", title: "Trichomoniasis & Carcinogenic part 1" },
                { id: "d5-4", code: "L43", subject: "Parasitology", title: "Trichomoniasis & Carcinogenic part 2" },
                { id: "d5-5", code: "L46", subject: "Pharmacology", title: "Contraception" }
            ]
        },
        {
            day: 6, date: "MAY 28", title: "EMBRYOLOGY & PREGNANCY DRUGS", icon: "👶",
            lectures: [
                { id: "d6-1", code: "L32", subject: "Anatomy", title: "Development of gonads" },
                { id: "d6-2", code: "L40", subject: "Anatomy", title: "Development of duct system & external genitalia" },
                { id: "d6-3", code: "L44", subject: "Microbiology", title: "Congenital viral infection" },
                { id: "d6-4", code: "L48", subject: "Pharmacology", title: "Drugs acting in uterus, ovulation" }
            ]
        },
        {
            day: 7, date: "MAY 29", title: "BREAST, PLACENTA & CATCH-UP", icon: "🩸",
            lectures: [
                { id: "d7-1", code: "L41", subject: "Histology", title: "Structure of placenta & mammary gland" },
                { id: "d7-2", code: "L42", subject: "Pathology", title: "Pathology of breast diseases" }
            ]
        }
    ];

    // Load saved progress from Local Storage
    let savedProgress = JSON.parse(localStorage.getItem('urogenitalProgress')) || {};

    function saveProgress() {
        localStorage.setItem('urogenitalProgress', JSON.stringify(savedProgress));
        updateProgressBars();
    }

    function toggleCheckbox(id, rowId) {
        const checkbox = document.getElementById(id);
        const row = document.getElementById(rowId);
        savedProgress[id] = checkbox.checked;
        
        if (checkbox.checked) {
            row.classList.add('completed');
        } else {
            row.classList.remove('completed');
        }
        saveProgress();
    }

    function updateProgressBars() {
        let totalLectures = 0;
        let completedLectures = 0;

        scheduleData.forEach(day => {
            let dayTotal = day.lectures.length;
            let dayCompleted = 0;

            day.lectures.forEach(lec => {
                totalLectures++;
                if (savedProgress[lec.id]) {
                    completedLectures++;
                    dayCompleted++;
                }
            });

            // Update individual day progress (if added later)
            const dayBar = document.getElementById(`day-fill-${day.day}`);
            if(dayBar) {
                dayBar.style.width = `${(dayCompleted / dayTotal) * 100}%`;
            }
        });

        const overallPercentage = totalLectures === 0 ? 0 : Math.round((completedLectures / totalLectures) * 100);
        document.getElementById('overall-percentage').innerText = `${overallPercentage}%`;
        document.getElementById('overall-fill').style.width = `${overallPercentage}%`;
    }

    function renderSchedule() {
        const container = document.getElementById('schedule-container');
        
        scheduleData.forEach(day => {
            let rowsHtml = '';
            day.lectures.forEach(lec => {
                const isChecked = savedProgress[lec.id] ? 'checked' : '';
                const completedClass = isChecked ? 'completed' : '';
                const subjectClass = `subject-${lec.subject.toLowerCase()}`;
                
                rowsHtml += `
                    <tr id="row-${lec.id}" class="${completedClass}">
                        <td class="checkbox-cell">
                            <input type="checkbox" id="${lec.id}" ${isChecked} 
                                onchange="toggleCheckbox('${lec.id}', 'row-${lec.id}')">
                        </td>
                        <td style="font-weight: 600;">${lec.code}</td>
                        <td><span class="badge ${subjectClass}">${lec.subject}</span></td>
                        <td>${lec.title}</td>
                    </tr>
                `;
            });

            const dayHTML = `
                <div class="day-section">
                    <div class="day-card">
                        <div class="day-number">DAY ${day.day}</div>
                        <div class="day-date">${day.date}</div>
                        <div class="day-icon">${day.icon}</div>
                        <div class="progress-bar-bg" style="width: 100%; height: 8px; margin-top: 15px;">
                            <div class="progress-bar-fill" id="day-fill-${day.day}"></div>
                        </div>
                    </div>
                    <div class="schedule-card">
                        <div class="schedule-header">
                            <h3>${day.title}</h3>
                        </div>
                        <table class="lecture-table">
                            <thead>
                                <tr>
                                    <th>✔</th>
                                    <th>Code</th>
                                    <th>Subject</th>
                                    <th>Title</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${rowsHtml}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
            container.innerHTML += dayHTML;
        });

        updateProgressBars();
    }

    // Initialize
    window.onload = renderSchedule;
</script>

</body>
</html>
