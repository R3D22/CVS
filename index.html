<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIT Module Planner - Paper 2</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Light Mode Variables */
            --bg-color: #f8faf9;
            --card-bg: #ffffff;
            --primary-green: #145a32;
            --mcq-orange: #e67e22;
            --border-color: #e0e6e3;
            --text-dark: #1a1a1a;
            --text-muted: #666666;
            --hover-bg: #f4f7f5;
            --progress-bg: #e9ecef;
            --icon-color: #145a32;
            --icon-accent: #e67e22;
            
            /* Subject Colors - Light */
            --c-anatomy: #e8f5e9; --t-anatomy: #2e7d32;
            --c-histology: #f3e5f5; --t-histology: #7b1fa2;
            --c-physiology: #e3f2fd; --t-physiology: #1976d2;
            --c-pathology: #fff3e0; --t-pathology: #e65100;
            --c-microbiology: #e0f2f1; --t-microbiology: #00796b;
            --c-pharmacology: #ffebee; --t-pharmacology: #c62828;
            --c-parasitology: #fffde7; --t-parasitology: #fbc02d;
            --c-biochemistry: #e8eaf6; --t-biochemistry: #3f51b5;
        }

        /* Dark Mode Variables */
        body.dark-mode {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --primary-green: #4caf50;
            --mcq-orange: #f39c12;
            --border-color: #333333;
            --text-dark: #f5f5f5;
            --text-muted: #aaaaaa;
            --hover-bg: #2a2a2a;
            --progress-bg: #333333;
            --icon-color: #4caf50;
            --icon-accent: #f39c12;
            
            /* Subject Colors - Dark */
            --c-anatomy: rgba(46, 125, 50, 0.2);     --t-anatomy: #81c784;
            --c-histology: rgba(123, 31, 162, 0.2);  --t-histology: #ce93d8;
            --c-physiology: rgba(25, 118, 210, 0.2); --t-physiology: #90caf9;
            --c-pathology: rgba(230, 81, 0, 0.2);    --t-pathology: #ffb74d;
            --c-microbiology: rgba(0, 121, 107, 0.2);--t-microbiology: #80cbc4;
            --c-pharmacology: rgba(198, 40, 40, 0.2);--t-pharmacology: #ef9a9a;
            --c-parasitology: rgba(251, 192, 45, 0.2);--t-parasitology: #fff59d;
            --c-biochemistry: rgba(63, 81, 181, 0.2); --t-biochemistry: #9fa8da;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-dark);
            padding: 20px;
            line-height: 1.6;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding-bottom: 40px;
        }

        /* Header Styles */
        .header {
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--primary-green);
            position: relative;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 15px;
        }

        .theme-toggle {
            background: var(--card-bg);
            color: var(--text-dark);
            border: 1px solid var(--border-color);
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .theme-toggle:hover {
            border-color: var(--primary-green);
            transform: scale(1.05);
        }

        .univ-title {
            font-size: 0.9rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .main-title {
            font-size: 2.5rem;
            color: var(--primary-green);
            font-weight: 700;
            margin-top: 15px;
        }

        .subtitle {
            font-size: 1.2rem;
            color: var(--text-muted);
            margin-bottom: 10px;
        }

        /* Overall Progress */
        .overall-progress-container {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            margin-bottom: 30px;
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-weight: 600;
            color: var(--primary-green);
        }

        .progress-bar-bg {
            background-color: var(--progress-bg);
            height: 12px;
            border-radius: 10px;
            overflow: hidden;
            transition: background-color 0.3s ease;
        }

        .progress-bar-fill {
            background-color: var(--primary-green);
            height: 100%;
            width: 0%;
            transition: width 0.5s ease-in-out, background-color 0.3s ease;
        }

        /* Day Layout */
        .day-section {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 24px;
            margin-bottom: 30px;
        }

        .day-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: transform 0.2s, background-color 0.3s ease, border-color 0.3s ease;
        }

        .day-card:hover {
            transform: translateY(-2px);
        }

        .day-number {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary-green);
        }

        .day-date {
            color: var(--text-muted);
            margin-bottom: 15px;
        }

        .day-icon {
            margin: 15px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 70px;
            height: 70px;
        }
